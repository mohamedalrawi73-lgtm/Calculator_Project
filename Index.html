<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Styling.css">
    <title>Calculator.com</title>
</head>
<body>
    <div class="calculator">
        <div class="answer">
            <input type="text" id="display" disabled>
        </div><br>
        <div class="buttons">
            <button class="btn" id="one">1</button>
            <button class="btn" id="two">2</button>
            <button class="btn" id="three">3</button>
            <button class="btn" id="four">4</button>
            <button class="btn" id="five">5</button>
            <button class="btn" id="six">6</button>
            <button class="btn" id="seven">7</button>
            <button class="btn" id="eight">8</button>
            <button class="btn" id="nine">9</button>
            <button class="btn" id="zero">0</button><br>
            <button class="btn" id="add">+</button>
            <button class="btn" id="subtract">-</button>
            <button class="btn" id="multiply">*</button>
            <button class="btn" id="divide">/</button>
            <button class="btn" id="percent">%</button>
            <button class="btn" id="decimal">.</button>
            <button class="btn" id="parenthesis">()</button>
            <button class="btn" id="pi">π</button>
            <button class="btn" id="square root">√</button>
            <button class="btn" id="exponent">^</button><br>
            <button class="btn" id="sin">sin</button>
            <button class="btn" id="cos">cos</button>
            <button class="btn" id="tan">tan</button>
            <button class="btn" id="log">log</button>
            <button class="btn" id="ln">ln</button>
            <button class="btn" id="factorial">!</button>
            <button class="btn" id="modulo">mod</button>
            <button class="btn" id="backspace">⌫</button>
            <button class="btn" id="clear">C</button>
            <button class="btn" id="equals">=</button>
        </div>
    </div>
    <script src="Main.js"></script>
</body>
</html>
